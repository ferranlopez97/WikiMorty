name: Android Testing CI
run-name: Testing
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Unit Test
        run: ./gradlew testReleaseUnitTest

      - name: Instrumentation Test
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -no-audio -no-boot-anim
          script: |
              adb wait-for-device
              ./gradlew core:presentation:connectedAndroidTest
              ./gradlew core:data:connectedAndroidTest

      - name: Android Test Report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: ${{ always() }}